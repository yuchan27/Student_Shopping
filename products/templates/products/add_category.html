{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-md-5 mb-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white fw-bold">
                    <i class="bi bi-folder-plus"></i> 新增商品分類
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">分類名稱</label>
                            {{ form.name }}
                            <div class="form-text text-muted">請輸入簡潔明確的分類名稱。</div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-plus-lg"></i> 確認新增
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
            <div class="mt-3 text-center">
                <a href="/" class="btn btn-outline-secondary btn-sm">回到首頁</a>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-light fw-bold text-dark">
                    <i class="bi bi-list-ul"></i> 目前已有的分類 ({{ categories|length }})
                </div>
                <div class="card-body p-0">
                    <ul class="list-group list-group-flush">
                        {% for cat in categories %}
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                <span>
                                    <span class="badge bg-secondary me-2">{{ cat.id }}</span>
                                    {{ cat.name }}
                                </span>
                                <span class="text-muted small">
                                    <i class="bi bi-tag"></i>
                                </span>
                            </li>
                        {% empty %}
                            <li class="list-group-item text-center text-muted py-4">
                                目前還沒有任何分類，快來新增第一個吧！
                            </li>
                        {% endfor %}
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
