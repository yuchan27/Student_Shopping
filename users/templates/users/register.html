{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">🎓 學生帳號註冊</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }} </div>
                    {% endfor %}
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg">註冊</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
